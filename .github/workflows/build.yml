name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Download and setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
        
    - name: Download Gradle manually
      run: |
        cd $HOME
        wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -q gradle-8.5-bin.zip
        export PATH=$HOME/gradle-8.5/bin:$PATH
        gradle --version
        
    - name: Build APK with pure gradle
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$HOME/gradle-8.5/bin
        cd $GITHUB_WORKSPACE
        gradle wrapper --gradle-version 8.5 || true
        gradle assembleDebug -x lint --no-daemon --offline || gradle assembleDebug -x lint --no-daemon
        
    - name: Find and check APK
      run: |
        find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null
        ls -la $GITHUB_WORKSPACE/app/build/outputs/apk/debug/ 2>/dev/null || echo "APK not found"
      
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
