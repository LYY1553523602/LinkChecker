name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'
      
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        echo "Build exit code: ${PIPESTATUS[0]}"
      
    - name: Check build output
      if: always()
      run: |
        cat build.log || true
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK directory not found"
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
      
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
